<!DOCTYPE html>

<body>
    <div class="container">
        <header>
            <div class="avatar">
                <img src="https://github.com/huidoudour.png" alt="Avatar" onerror="this.src='./images/avatar.png'; this.onerror=null;">
            </div>
            <h1>关于<span>我</span></h1>

            <a href="https://github.com/huidoudour" target="_blank" class="github-link">
                <i class="fab fa-github"></i> 访问 GitHub 主页
            </a>
        </header>

        <nav class="nav-menu">
            <a href="index.html" class="nav-item">
                <i class="fas fa-home"></i> 首页
            </a>
            <a href="about.html" class="nav-item active">

            </a>
            <a href="contact.html" class="nav-item">
                <i class="fas fa-envelope"></i> 联系
            </a>
        </nav>

        <div class="about-content">
            <div class="github-card-container">
                <a href="https://github.com/huidoudour/Learn-of-all" target="_blank" rel="noopener noreferrer">
                    <picture>
                        <source 
                            media="(prefers-color-scheme: dark)" 
                            srcset="https://github-status-eight.vercel.app/api/pin/?username=huidoudour&repo=Learn-of-all&hide_border=true&bg_color=0D1117&title_color=90CAF9&text_color=64B5F6&icon_color=CE93D8&cache_seconds=1" />
                        <source 
                            media="(prefers-color-scheme: light)" 
                            srcset="https://github-status-eight.vercel.app/api/pin/?username=huidoudour&repo=Learn-of-all&hide_border=true&bg_color=E3F2FD&title_color=0D47A1&text_color=1565C0&icon_color=8E24AA&cache_seconds=1" />
                        <img 
                            src="https://github-status-eight.vercel.app/api/pin/?username=huidoudour&repo=Learn-of-all&hide_border=true&bg_color=E3F2FD&title_color=0D47A1&text_color=1565C0&icon_color=8E24AA&cache_seconds=1"

            <div class="about-text">
                <h2><i class="fas fa-quote-left"></i> 话语</h2>
                <p>一切美好皆岁月，时光荏苒，每一刻都是珍贵的礼物。</p>
                <p>你保护世界，我保护你。在这个充满挑战与机遇的时代，我们携手前行。</p>
            </div>

            <div class="about-text">
                <h2><i class="fas fa-compass"></i> 我的理念</h2>
                <div class="approach-list">
                    <div class="approach-item">
                        <div class="approach-number"><i class="fas fa-book"></i></div>
                        <div>
                            <h3>持续学习</h3>
                            <p>保持好奇心，不断探索新知识，追求个人成长与进步。</p>
                        </div>
                    </div>
                    <div class="approach-item">
                        <div class="approach-number"><i class="fas fa-lightbulb"></i></div>
                        <div>
                            <h3>创新思维</h3>
                            <p>勇于突破常规，用创新的视角看待问题，寻找最佳解决方案。</p>
                        </div>
                    </div>
                    <div class="approach-item">
                        <div class="approach-number"><i class="fas fa-heart"></i></div>

                            <p>秉持真诚与尊重，建立良好的人际关系，共同创造价值。</p>
                        </div>
                    </div>
                </div>

            <p>最后更新日期: <span id="currentDate"></span></p>

    <script>
        // 显示当前日期
        document.getElementById('currentDate').textContent = new Date().toLocaleDateString('zh-CN', {
            year: 'numeric',
            month: 'long',
            day: 'numeric',
            weekday: 'long'
        });

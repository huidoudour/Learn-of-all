<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Huidou - Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css?v=20260502">
</head>
<body>
    <div class="container">
        <header>
            <div class="avatar">
                <img src="https://github.com/huidoudour.png" alt="Avatar" onerror="this.src='./images/avatar.png'; this.onerror=null;">
            </div>
            <h1>欢迎来到<span>Huidou</span>的空间</h1>
            <p class="subtitle">创意与想法的交汇点，探索无限可能</p>
            <a href="https://github.com/huidoudour" target="_blank" class="github-link">
                <i class="fab fa-github"></i> 访问 GitHub 主页
            </a>
        </header>

        <nav class="nav-menu">
            <a href="index.html" class="nav-item active">
                <i class="fas fa-home"></i> 首页
            </a>
            <a href="about.html" class="nav-item">
                <i class="fas fa-user"></i> 关于
            </a>
            <a href="contact.html" class="nav-item">
                <i class="fas fa-envelope"></i> 联系
            </a>
        </nav>

        <section class="intro">
            <p>这里是我的个人空间，展示创意、思路和成果。每个项目都承载着不同的想法和技术探索，欢迎浏览和交流。</p>
        </section>

        <div class="features-grid">
            <div class="feature-card">
                <div class="feature-icon"><i class="fas fa-lightbulb"></i></div>
                <h3>创意</h3>
                <p>创意是发现事物的源泉，激发无限可能</p>
            </div>
            <div class="feature-card">
                <div class="feature-icon"><i class="fas fa-rocket"></i></div>
                <h3>思路</h3>
                <p>思路是解决问题的可靠途径，指引前行方向</p>
            </div>
            <div class="feature-card">
                <div class="feature-icon"><i class="fas fa-trophy"></i></div>
                <h3>成功</h3>
                <p>一切行动都是成功的铺垫，见证成长历程</p>
            </div>
        </div>

        <div class="stats">
            <div class="stat-item">
                <div class="stat-number">∞</div>
                <div class="stat-label">创意想法</div>
            </div>
            <div class="stat-item">
                <div class="stat-number">2026</div>
                <div class="stat-label">持续更新</div>
            </div>
            <div class="stat-item">
                <div class="stat-number">开放</div>
                <div class="stat-label">交流分享</div>
            </div>
        </div>

        <footer>
            <p>© 2026 Huidou | 用心创造，用爱分享</p>
            <p>最后更新日期: <span id="currentDate"></span></p>
        </footer>
    </div>

    <script>
        // 显示当前日期
        document.getElementById('currentDate').textContent = new Date().toLocaleDateString('zh-CN', {
            year: 'numeric',
            month: 'long',
            day: 'numeric',
            weekday: 'long'
        });
    </script>
</body>
</html>

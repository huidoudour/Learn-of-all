<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNMP网络设备监控系统</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        
        .header h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 10px;
            font-size: 2.5em;
        }
        
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .status-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        
        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        .status-online {
            background: #27ae60;
        }
        
        .status-offline {
            background: #e74c3c;
        }
        
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }
        
        .card:hover {
            transform: translateY(-5px);
        }
        
        .card h3 {
            color: #2c3e50;
            margin-bottom: 15px;
            border-bottom: 2px solid #3498db;
            padding-bottom: 5px;
        }
        
        .metric {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding: 8px;
            background: rgba(52, 152, 219, 0.1);
            border-radius: 8px;
        }
        
        .metric-value {
            font-weight: bold;
            font-size: 1.2em;
        }
        
        .chart-container {
            height: 300px;
            margin-top: 15px;
        }
        
        .interface-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }
        
        .interface-item {
            padding: 10px;
            background: rgba(52, 152, 219, 0.1);
            border-radius: 8px;
            border-left: 4px solid #3498db;
        }
        
        .interface-up {
            border-left-color: #27ae60;
        }
        
        .interface-down {
            border-left-color: #e74c3c;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: #3498db;
            color: white;
        }
        
        .btn-success {
            background: #27ae60;
            color: white;
        }
        
        .btn-danger {
            background: #e74c3c;
            color: white;
        }
        
        .btn-warning {
            background: #f39c12;
            color: white;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        
        .loading {
            text-align: center;
            padding: 20px;
            color: #7f8c8d;
        }
        
        .error {
            background: #e74c3c;
            color: white;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
        }
        
        @media (max-width: 768px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
            
            .status-bar {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .controls {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1> SNMP网络设备监控系统</h1>
            <div class="status-bar">
                <div class="status-item">
                    <div class="status-indicator" id="pingStatus"></div>
                    <span>设备状态: <strong id="deviceStatus">检测中...</strong></span>
                </div>
                <div class="status-item">
                    <span>IP地址: <strong>192.168.8.1</strong></span>
                </div>
                <div class="status-item">
                    <span>设备型号: <strong id="deviceModel">检测中...</strong></span>
                </div>
                <div class="status-item">
                    <span>运行时间: <strong id="uptime">检测中...</strong></span>
                </div>
                <div class="status-item">
                    <span>最后更新: <strong id="lastUpdate">--:--:--</strong></span>
                </div>
            </div>
            <div class="controls">
                <button class="btn btn-primary" onclick="refreshData()"> 刷新数据</button>
                <button class="btn btn-success" onclick="pingTest()"> Ping测试</button>
                <button class="btn btn-warning" onclick="toggleHistory()"> 历史记录</button>
                <button class="btn btn-danger" onclick="clearHistory()">️ 清除历史</button>
            </div>
        </div>
        
        <div class="dashboard">
            <!-- CPU使用率 -->
            <div class="card">
                <h3> CPU使用率</h3>
                <div class="metric">
                    <span>当前使用率:</span>
                    <span class="metric-value" id="cpuUsage">0%</span>
                </div>
                <div class="chart-container">
                    <canvas id="cpuChart"></canvas>
                </div>
            </div>
            
            <!-- 内存使用率 -->
            <div class="card">
                <h3> 内存使用率</h3>
                <div class="metric">
                    <span>当前使用率:</span>
                    <span class="metric-value" id="memoryUsage">0%</span>
                </div>
                <div class="chart-container">
                    <canvas id="memoryChart"></canvas>
                </div>
            </div>
            
            <!-- 包传输速率 -->
            <div class="card">
                <h3> 包传输速率</h3>
                <div class="metric">
                    <span>接收包数:</span>
                    <span class="metric-value" id="inPackets">0</span>
                </div>
                <div class="metric">
                    <span>发送包数:</span>
                    <span class="metric-value" id="outPackets">0</span>
                </div>
                <div class="chart-container">
                    <canvas id="packetChart"></canvas>
                </div>
            </div>
        </div>
        
        <!-- 接口状态 -->
        <div class="card">
            <h3> 网络接口状态</h3>
            <div id="interfacesContainer" class="interface-grid">
                <div class="loading">加载接口信息中...</div>
            </div>
        </div>
        
        <!-- 设备信息 -->
        <div class="card">
            <h3> 设备信息</h3>
            <div id="deviceInfo">
                <div class="loading">加载设备信息中...</div>
            </div>
        </div>
    </div>

    <script>
        // 图表实例
        let cpuChart, memoryChart, packetChart;
        let showAllHistory = false;
        
        // 初始化图表
        function initCharts() {
            // CPU使用率图表
            const cpuCtx = document.getElementById('cpuChart').getContext('2d');
            cpuChart = new Chart(cpuCtx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'CPU使用率 (%)',
                        data: [],
                        borderColor: '#3498db',
                        backgroundColor: 'rgba(52, 152, 219, 0.1)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: 100,
                            ticks: {
                                callback: function(value) {
                                    return value + '%';
                                }
                            }
                        }
                    }
                }
            });
            
            // 内存使用率图表
            const memoryCtx = document.getElementById('memoryChart').getContext('2d');
            memoryChart = new Chart(memoryCtx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: '内存使用率 (%)',
                        data: [],
                        borderColor: '#9b59b6',
                        backgroundColor: 'rgba(155, 89, 182, 0.1)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: 100,
                            ticks: {
                                callback: function(value) {
                                    return value + '%';
                                }
                            }
                        }
                    }
                }
            });
            
            // 包传输速率图表
            const packetCtx = document.getElementById('packetChart').getContext('2d');
            packetChart = new Chart(packetCtx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [
                        {
                            label: '接收包数',
                            data: [],
                            borderColor: '#27ae60',
                            backgroundColor: 'rgba(39, 174, 96, 0.1)',
                            borderWidth: 2,
                            fill: true,
                            tension: 0.4
                        },
                        {
                            label: '发送包数',
                            data: [],
                            borderColor: '#e74c3c',
                            backgroundColor: 'rgba(231, 76, 60, 0.1)',
                            borderWidth: 2,
                            fill: true,
                            tension: 0.4
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false
                }
            });
        }
        
        // 更新图表数据
        function updateCharts(historyData) {
            if (historyData.cpu && historyData.cpu.length > 0) {
                const labels = historyData.cpu.map(item => item.time);
                const cpuData = historyData.cpu.map(item => item.usage);
                
                cpuChart.data.labels = labels;
                cpuChart.data.datasets[0].data = cpuData;
                cpuChart.update('none');
            }
            
            if (historyData.memory && historyData.memory.length > 0) {
                const labels = historyData.memory.map(item => item.time);
                const memoryData = historyData.memory.map(item => item.usage);
                
                memoryChart.data.labels = labels;
                memoryChart.data.datasets[0].data = memoryData;
                memoryChart.update('none');
            }
            
            if (historyData.packets && historyData.packets.length > 0) {
                const labels = historyData.packets.map(item => item.time);
                const inData = historyData.packets.map(item => item.in_packets);
                const outData = historyData.packets.map(item => item.out_packets);
                
                packetChart.data.labels = labels;
                packetChart.data.datasets[0].data = inData;
                packetChart.data.datasets[1].data = outData;
                packetChart.update('none');
            }
        }
        
        // 获取当前数据
        async function fetchCurrentData() {
            try {
                const response = await fetch('/api/current_data');
                const result = await response.json();
                
                if (result.success) {
                    updateUI(result.data);
                    document.getElementById('lastUpdate').textContent = result.timestamp.split(' ')[1];
                } else {
                    showError('获取数据失败: ' + result.error);
                }
            } catch (error) {
                showError('网络错误: ' + error.message);
            }
        }
        
        // 获取历史数据
        async function fetchHistoryData(showAll = false) {
            try {
                const url = showAll ? '/api/history_data?show_all=true' : '/api/history_data';
                const response = await fetch(url);
                const result = await response.json();
                
                if (result.success) {
                    updateCharts(result.history);
                    showAllHistory = result.show_all;
                    
                    // 更新按钮文本
                    const historyBtn = document.querySelector('button.btn-warning');
                    if (showAllHistory) {
                        historyBtn.textContent = ' 显示最近';
                    } else {
                        historyBtn.textContent = ' 历史记录';
                    }
                }
            } catch (error) {
                console.error('获取历史数据失败:', error);
            }
        }
        
        // 更新UI显示
        function updateUI(data) {
            // 更新设备状态
            const pingStatus = document.getElementById('pingStatus');
            const deviceStatus = document.getElementById('deviceStatus');
            
            if (data.ping.status === '在线') {
                pingStatus.className = 'status-indicator status-online';
                deviceStatus.textContent = '在线';
                deviceStatus.style.color = '#27ae60';
            } else {
                pingStatus.className = 'status-indicator status-offline';
                deviceStatus.textContent = data.ping.status;
                deviceStatus.style.color = '#e74c3c';
            }
            
            // 更新设备信息
            document.getElementById('deviceModel').textContent = data.device_info.sys_name || '未知';
            document.getElementById('uptime').textContent = data.uptime;
            
            // 更新CPU和内存使用率
            document.getElementById('cpuUsage').textContent = data.cpu_usage + '%';
            document.getElementById('memoryUsage').textContent = data.memory_usage + '%';
            
            // 更新包传输速率
            document.getElementById('inPackets').textContent = data.packet_rates.in_packets.toLocaleString();
            document.getElementById('outPackets').textContent = data.packet_rates.out_packets.toLocaleString();
            
            // 更新接口状态
            updateInterfaces(data.interfaces);
            
            // 更新设备信息
            updateDeviceInfo(data.device_info);
        }
        
        // 更新接口状态显示
        function updateInterfaces(interfaces) {
            const container = document.getElementById('interfacesContainer');
            container.innerHTML = '';
            
            if (Object.keys(interfaces).length === 0) {
                container.innerHTML = '<div class="loading">暂无接口数据</div>';
                return;
            }
            
            for (const [name, info] of Object.entries(interfaces)) {
                const statusClass = info.status === 'Up' ? 'interface-up' : 'interface-down';
                const interfaceDiv = document.createElement('div');
                interfaceDiv.className = `interface-item ${statusClass}`;
                interfaceDiv.innerHTML = `
                    <strong>${name}</strong><br>
                    状态: ${info.status}<br>
                    速率: ${info.speed}<br>
                    接收: ${info.in_traffic}<br>
                    发送: ${info.out_traffic}
                `;
                container.appendChild(interfaceDiv);
            }
        }
        
        // 更新设备信息显示
        function updateDeviceInfo(info) {
            const container = document.getElementById('deviceInfo');
            container.innerHTML = '';
            
            const infoItems = [
                { label: '系统描述', value: info.sys_descr || '未知' },
                { label: '设备名称', value: info.sys_name || '未知' },
                { label: '设备位置', value: info.sys_location || '未知' },
                { label: '联系人', value: info.sys_contact || '未知' }
            ];
            
            infoItems.forEach(item => {
                const div = document.createElement('div');
                div.className = 'metric';
                div.innerHTML = `
                    <span>${item.label}:</span>
                    <span class="metric-value">${item.value}</span>
                `;
                container.appendChild(div);
            });
        }
        
        // 显示错误信息
        function showError(message) {
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error';
            errorDiv.textContent = message;
            
            // 添加到页面顶部
            document.querySelector('.header').appendChild(errorDiv);
            
            // 3秒后自动移除
            setTimeout(() => {
                errorDiv.remove();
            }, 3000);
        }
        
        // 刷新数据
        async function refreshData() {
            await fetchCurrentData();
            await fetchHistoryData(showAllHistory);
        }
        
        // Ping测试
        async function pingTest() {
            try {
                const response = await fetch('/api/ping_test');
                const result = await response.json();
                
                if (result.success) {
                    alert(`Ping测试结果:\n状态: ${result.ping.status}\n响应时间: ${result.ping.response_time || 'N/A'}ms`);
                } else {
                    alert('Ping测试失败: ' + result.error);
                }
            } catch (error) {
                alert('Ping测试错误: ' + error.message);
            }
        }
        
        // 切换历史记录显示
        async function toggleHistory() {
            await fetchHistoryData(!showAllHistory);
        }
        
        // 清除历史数据
        function clearHistory() {
            if (confirm('确定要清除所有历史数据吗？')) {
                // 重新初始化图表
                cpuChart.data.labels = [];
                cpuChart.data.datasets[0].data = [];
                cpuChart.update();
                
                memoryChart.data.labels = [];
                memoryChart.data.datasets[0].data = [];
                memoryChart.update();
                
                packetChart.data.labels = [];
                packetChart.data.datasets[0].data = [];
                packetChart.data.datasets[1].data = [];
                packetChart.update();
                
                alert('历史数据已清除');
            }
        }
        
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            initCharts();
            refreshData();
            
            // 每10秒自动刷新数据
            setInterval(refreshData, 10000);
        });
    </script>
</body>
</html>

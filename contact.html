<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Huidou - Contact</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css?v=20260502">
</head>
<body>
    <div class="container">
        <header>
            <div class="avatar">
                <img src="https://github.com/huidoudour.png" alt="Avatar" onerror="this.src='./images/avatar.png'; this.onerror=null;">
            </div>
            <h1>联系<span>我</span></h1>
            <p class="subtitle">乐于听取意见，期待与您交流</p>
            <a href="https://github.com/huidoudour" target="_blank" class="github-link">
                <i class="fab fa-github"></i> 访问 GitHub 主页
            </a>
        </header>

        <nav class="nav-menu">
            <a href="index.html" class="nav-item">
                <i class="fas fa-home"></i> 首页
            </a>
            <a href="about.html" class="nav-item">
                <i class="fas fa-user"></i> 关于
            </a>
            <a href="contact.html" class="nav-item active">
                <i class="fas fa-envelope"></i> 联系
            </a>
        </nav>

        <section class="intro">
            <p>欢迎通过以下方式与我取得联系。无论是合作机会、技术交流还是简单的问候，我都非常乐意收到您的消息。</p>
        </section>

        <div class="contact-container">
            <div class="contact-info">
                <h2><i class="fas fa-address-card"></i> 联系方式</h2>
                <div class="info-item">
                    <div class="info-icon"><i class="fas fa-envelope"></i></div>
                    <a href="mailto:doudou@huidou.fun">doudou@huidou.fun</a>
                </div>
                
                <h2><i class="fas fa-share-alt"></i> 常联系</h2>
                <div class="social-links">
                    <a href="README.html" class="social-button">
                        <i class="fas fa-file-alt"></i> ReadMe
                    </a>
                    <a href="https://github.com/huidoudour" target="_blank" class="social-button">
                        <i class="fab fa-github"></i> GitHub
                    </a>
                    <a href="mailto:doudou@huidou.fun" class="social-button">
                        <i class="fas fa-paper-plane"></i> Email
                    </a>
                </div>
            </div>
            
            <div class="contact-form">
                <h2><i class="fas fa-paper-plane"></i> 发送消息</h2>
                <form>
                    <div class="form-group">
                        <input type="text" placeholder="您的姓名" required>
                    </div>
                    <div class="form-group">
                        <input type="email" placeholder="您的邮箱" required>
                    </div>
                    <div class="form-group">
                        <textarea placeholder="您的消息" rows="5" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-paper-plane"></i> 发送信件
                    </button>
                </form>
            </div>
        </div>

        <footer>
            <p>© 2026 Huidou | 用心创造，用爱分享</p>
            <p>最后更新日期: <span id="currentDate"></span></p>
        </footer>
    </div>

    <script>
        // 显示当前日期
        document.getElementById('currentDate').textContent = new Date().toLocaleDateString('zh-CN', {
            year: 'numeric',
            month: 'long',
            day: 'numeric',
            weekday: 'long'
        });
    </script>
</body>
</html>
